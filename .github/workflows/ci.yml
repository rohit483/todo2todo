name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Compose Services
        run: docker-compose build

      - name: Start Services (Dry Run)
        run: docker-compose up -d

      - name: Check Running Containers
        run: docker ps
        
      # TODO: Add your custom deployment step here dependent on where you host (e.g., SSH, Render Deploy Hook, etc.)
