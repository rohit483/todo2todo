<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="/static/style.css?v=2.0">
</head>

<body>
    <div class="header-bar">
        <h1>Todo App</h1>
        <span style="font-size: 0.9rem; color: var(--text-muted); margin-top: -8px;">by Rohit Chawda</span>
        <div class="header-right">
            <span id="user-info"></span>
            <button id="logout-btn" class="auth-btn btn-danger" style="display: none;">Logout</button>
            <button id="delete-account-btn" class="auth-btn btn-danger"
                style="display: none; background-color: #eae5e5; margin-left: 10px;">Delete Account</button>
        </div>
    </div>

    <!-- Auth Card Container -->
    <div id="auth-container" class="card">
        <p id="auth-subtitle">Welcome back! Please login to your account.</p>

        <form id="email-auth-form" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="email-input">Email</label>
                <input type="email" id="email-input" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label for="password-input">Password</label>
                <input type="password" id="password-input" placeholder="••••••••" required>
            </div>
            <!-- Error message container -->
            <div id="auth-error" class="error-msg" style="display: none;"></div>

            <button type="submit" id="email-submit-btn" class="auth-btn btn-primary w-100">Login</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button id="login-btn" class="auth-btn btn-google w-100">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>

        <p class="auth-switch">
            <span id="auth-switch-text">Don't have an account?</span>
            <a href="#" id="auth-switch-link">Register here</a>
        </p>
    </div>

    <!-- Main Todo App Container -->
    <div id="app-container" class="card" style="display: none;">
        <div class="form-container">
            <input type="text" id="task-input" placeholder="Enter a new task...">
            <button id="add-btn">Add Task</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <!-- Firebase & App Logic -->
    <script type="module" src="/static/script.js?v=2.0"></script>
</body>

</html>
